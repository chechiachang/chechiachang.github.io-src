name: Deploy PR Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

# Cancel in-progress preview deployments for the same PR when new commits arrive.
concurrency: preview-${{ github.ref }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Init required submodules
        if: github.event.action != 'closed'
        run: |
          git submodule sync -- themes/PaperMod
          git submodule update --init --depth=1 themes/PaperMod

      - name: Setup Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: '24.1.0'

      - name: Setup Hugo
        if: github.event.action != 'closed'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.146.5'
          extended: true

      - name: Build (PR preview)
        if: github.event.action != 'closed'
        env:
          HUGO_ENVIRONMENT: development
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "https://chechia.net/pr-preview/pr-${{ github.event.number }}/" \
            --destination ./docs

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9
        with:
          source-dir: ./docs/
          preview-branch: master
          umbrella-dir: docs/pr-preview
          pages-base-path: docs
          pages-base-url: chechia.net
          wait-for-pages-deployment: true
          qr-code: true
