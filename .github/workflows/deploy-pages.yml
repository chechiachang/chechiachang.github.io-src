name: Deploy Pages Site

on:
  push:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: pages-main-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-main-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Init required submodules
        run: |
          git submodule sync -- themes/PaperMod
          git submodule update --init --depth=1 themes/PaperMod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.1.0'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.146.5'
          extended: true

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --destination ./docs

      - name: Prepare site artifacts
        run: |
          rm -rf ./tmp/site
          mkdir -p ./tmp/site
          cp -a docs/. ./tmp/site/
          echo "chechia.net" > ./tmp/site/CNAME
          touch ./tmp/site/.nojekyll

